<!doctype html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

{% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <!--[if lt IE 9]>
    <script src="//html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

  <body>
    <div class="wrapper">
      <div class="sidenav">
        <h1>{{ site.title | default: site.github.repository_name }}</h1>
        <h6>{{ site.description | default: site.github.project_tagline }}</p>

        <ul>
            <li><a class="sidebar_buttons" href="https://enzi.github.io/NZSpellCasting/">Getting Started</a></li>           
            <li><a class="sidebar_buttons" href="https://enzi.github.io/NZSpellCasting/faq">FAQ</a></li>
            <li><a class="sidebar_buttons" href="https://github.com/enzi/NZSpellCasting">View On GitHub</a></li>
        </ul>

      <section>
        {{ content }}
      </section>
    </div>
    <!--[if !IE]><script>fixScale(document);</script><![endif]-->

</html>
